services:
  app:
    image: node:18
    container_name: node-app
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && node app.js"
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydb
    ports:
      - "3306:3306"
